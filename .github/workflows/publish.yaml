# to support workflow_call from release-pipeline.yaml.
#
# To regenerate, run:
#
#    maturin generate-ci -o .github/workflows/publish.yaml github
#
# Regenerating will overwrite the trigger block and the per-job `if:`
# conditions below. Re-apply the workflow_call inputs (`dry_run`), delete
# the `on.workflow_run` block, remove all `if: ${{ github.event_name ... }}`
# guards, and wrap the `uv publish` step with the dry_run gate before
# committing. Also re-add the hand-written `crates-io` job at the bottom
# (maturin does not generate it) — it publishes the pyo3-free seqpro-core
# crate to crates.io on a version bump.
name: Publish

on:
  workflow_call:
    inputs:
      dry_run:
        description: 'Build wheels but skip uv publish'
        type: boolean
        required: false
        default: false
      tag:
        description: 'Tag to check out and build wheels from (defaults to caller ref)'
        type: string
        required: false
        default: ''
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build wheels but skip uv publish'
        type: boolean
        required: false
        default: false
      tag:
        description: 'Tag to check out and build wheels from (defaults to current ref)'
        type: string
        required: false
        default: ''

permissions:
  contents: read

jobs:
  linux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: x86
          - runner: ubuntu-22.04
            target: aarch64
          - runner: ubuntu-22.04
            target: armv7
          - runner: ubuntu-22.04
            target: s390x
          - runner: ubuntu-22.04
            target: ppc64le
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: auto
      - name: Build free-threaded wheels
        # cp314t free-threaded cross-builds are flaky (QEMU emulation); don't let
        # a free-threaded build failure block the release of the stable wheels.
        continue-on-error: true
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i python3.14t
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: auto
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist

  musllinux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: x86
          - runner: ubuntu-22.04
            target: aarch64
          - runner: ubuntu-22.04
            target: armv7
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: musllinux_1_2
      - name: Build free-threaded wheels
        # cp314t free-threaded cross-builds are flaky (QEMU emulation); don't let
        # a free-threaded build failure block the release of the stable wheels.
        continue-on-error: true
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i python3.14t
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: musllinux_1_2
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-musllinux-${{ matrix.platform.target }}
          path: dist

  windows:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            target: x64
            python_arch: x64
          - runner: windows-latest
            target: x86
            python_arch: x86
          - runner: windows-11-arm
            target: aarch64
            python_arch: arm64
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          architecture: ${{ matrix.platform.python_arch }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14t'
          architecture: ${{ matrix.platform.python_arch }}
      - name: Build free-threaded wheels
        # cp314t free-threaded cross-builds are flaky (QEMU emulation); don't let
        # a free-threaded build failure block the release of the stable wheels.
        continue-on-error: true
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i python3.14t
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: dist

  macos:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-15-intel
            target: x86_64
          - runner: macos-latest
            target: aarch64
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14t'
      - name: Build free-threaded wheels
        # cp314t free-threaded cross-builds are flaky (QEMU emulation); don't let
        # a free-threaded build failure block the release of the stable wheels.
        continue-on-error: true
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i python3.14t
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v6
        with:
          name: wheels-sdist
          path: dist

  release:
    environment: pypi
    name: Release
    runs-on: ubuntu-latest
    needs: [linux, musllinux, windows, macos, sdist]
    permissions:
      # Use to sign the release artifacts
      id-token: write
      # Used to upload release artifacts
      contents: write
      # Used to generate artifact attestation
      attestations: write
    steps:
      - uses: actions/download-artifact@v7
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: 'wheels-*/*'
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Publish to PyPI
        if: inputs.dry_run == false
        run: uv publish 'wheels-*/*'

      - name: Dry-run summary (skipped uv publish)
        if: inputs.dry_run == true
        run: |
          {
            echo "## Dry-run: would have published the following wheels"
            echo
            ls -1 wheels-*/* | sed 's/^/- /'
          } >> "$GITHUB_STEP_SUMMARY"

  # Publish the pyo3-free seqpro-core crate to crates.io. Bump-detected and
  # idempotent: it reads the version from crates/seqpro-core/Cargo.toml and
  # publishes only when that version is not already on crates.io, so an
  # unchanged version is a no-op (success), and bumping the crate's version is
  # what triggers a release. Independent of the Python wheel/PyPI publish above.
  crates-io:
    name: Publish seqpro-core to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Detect seqpro-core version and whether it is already published
        id: ver
        run: |
          version=$(grep -m1 '^version' crates/seqpro-core/Cargo.toml \
            | sed -E 's/version *= *"([^"]+)".*/\1/')
          if [ -z "$version" ]; then
            echo "::error::could not read seqpro-core version from crates/seqpro-core/Cargo.toml"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          # crates.io requires a descriptive User-Agent or it returns 403.
          code=$(curl -s -o /dev/null -w '%{http_code}' \
            -H 'User-Agent: seqpro-release-pipeline (https://github.com/ML4GLand/SeqPro)' \
            "https://crates.io/api/v1/crates/seqpro-core/$version")
          if [ "$code" = "200" ]; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "seqpro-core $version is already on crates.io — no bump detected, skipping." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "seqpro-core $version not found on crates.io (HTTP $code) — will publish." >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Dry-run publish
        if: inputs.dry_run == true && steps.ver.outputs.published == 'false'
        run: cargo publish -p seqpro-core --dry-run
      - name: Publish to crates.io
        if: inputs.dry_run == false && steps.ver.outputs.published == 'false'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO }}
        run: cargo publish -p seqpro-core
