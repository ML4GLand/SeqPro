name: Bump and release

on:
  workflow_dispatch:

jobs:
  bump-version:
    runs-on: ubuntu-latest
    name: "Bump version and create changelog with commitizen"
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: "${{ secrets.GH_TOKEN }}"

      - name: Install commitizen
        run: pip install commitizen --quiet

      - name: Detect partial bump
        id: detect
        run: |
          PROJECT_VERSION=$(cz version --project)
          LATEST_TAG=$(git tag --sort=-version:refname | head -1)
          echo "project_version=$PROJECT_VERSION" >> $GITHUB_OUTPUT
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          if [ -n "$LATEST_TAG" ] && [ "$LATEST_TAG" != "$PROJECT_VERSION" ]; then
            echo "tag_exists=true" >> $GITHUB_OUTPUT
            echo "REVISION=$LATEST_TAG" >> $GITHUB_ENV
          else
            echo "tag_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create bump and changelog
        if: steps.detect.outputs.tag_exists != 'true'
        uses: commitizen-tools/commitizen-action@master
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          changelog_increment_filename: body.md

      - name: Generate release body for existing tag
        if: steps.detect.outputs.tag_exists == 'true'
        run: |
          PREV="${{ steps.detect.outputs.project_version }}"
          CURR="${{ steps.detect.outputs.latest_tag }}"
          git log "${PREV}..${CURR}" --pretty=format:"- %s" --no-merges > body.md

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: "body.md"
          tag_name: ${{ env.REVISION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
