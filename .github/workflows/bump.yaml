name: Bump and release

on:
  workflow_dispatch:

jobs:
  bump-version:
    runs-on: ubuntu-latest
    name: "Bump version and create changelog with commitizen"
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: "${{ secrets.GH_TOKEN }}"

      - name: Install commitizen
        run: pip install commitizen --quiet

      - name: Detect next version
        id: detect
        run: |
          DRY=$(cz bump --dry-run 2>&1)
          NEXT=$(echo "$DRY" | grep -oP 'bump: version \S+ → \K\S+' || echo "")
          echo "next_version=$NEXT" >> $GITHUB_OUTPUT
          if [ -n "$NEXT" ] && git rev-parse "refs/tags/$NEXT" >/dev/null 2>&1; then
            echo "tag_exists=true" >> $GITHUB_OUTPUT
            echo "REVISION=$NEXT" >> $GITHUB_ENV
          else
            echo "tag_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create bump and changelog
        if: steps.detect.outputs.tag_exists != 'true'
        uses: commitizen-tools/commitizen-action@master
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          changelog_increment_filename: body.md

      - name: Generate release body for existing tag
        if: steps.detect.outputs.tag_exists == 'true'
        run: |
          PREV=$(git tag --sort=-version:refname | grep -v "^${{ steps.detect.outputs.next_version }}$" | head -1)
          git log "${PREV}..${{ steps.detect.outputs.next_version }}" \
            --pretty=format:"- %s" --no-merges > body.md

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: "body.md"
          tag_name: ${{ env.REVISION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
