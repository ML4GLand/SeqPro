name: Create release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. 0.10.0)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Extract changelog section
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          # Print lines after the matching version header up to (but not
          # including) the next version header. Skip the version header itself
          # since the release UI already shows the tag/version.
          awk -v tag="$TAG" '
            $0 ~ "^## " tag " " { flag=1; next }
            flag && /^## / { exit }
            flag { print }
          ' CHANGELOG.md > body.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          body_path: body.md
          token: ${{ secrets.GH_TOKEN }}
