default_stages: [pre-commit]
repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
  - id: check-merge-conflict
  - id: debug-statements
  - id: mixed-line-ending
  - id: check-case-conflict
  - id: check-yaml
    exclude: ^meta\.yaml$
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.15.12
  hooks:
  - id: ruff
  - id: ruff-format
- repo: https://github.com/commitizen-tools/commitizen
  rev: v4.15.0
  hooks:
  - id: commitizen
    stages: [commit-msg]
- repo: local
  hooks:
  - id: pyrefly
    name: Type-check with pyrefly
    entry: pixi run typecheck
    language: system
    types: [python]
    pass_filenames: false
  - id: pixi lock
    name: Lock pixi environment
    entry: pixi lock
    language: system
    stages: [pre-push]
    pass_filenames: false
  - id: cargo-check
    name: Type-check Rust with cargo check
    entry: cargo check --all-targets --all-features
    language: system
    types: [rust]
    pass_filenames: false
  - id: cargo-fmt
    name: Format Rust with cargo fmt
    entry: cargo fmt --all
    language: system
    types: [rust]
    pass_filenames: false
  - id: cargo-clippy
    name: Lint Rust with cargo clippy
    entry: cargo clippy --all-targets -- -D warnings
    language: system
    types: [rust]
    pass_filenames: false
