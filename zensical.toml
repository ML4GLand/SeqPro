[project]
site_name = "SeqPro"
site_url = "https://ml4gland.github.io/SeqPro"
site_description = "Fast biological sequence processing for Python"
site_author = "David Laub, Adam Klie"
repo_url = "https://github.com/ML4GLand/SeqPro"
repo_name = "ML4GLand/SeqPro"
edit_uri = "edit/main/docs/"
docs_dir = "docs"

nav = [
  { "Home" = "index.md" },
  { "API Reference" = "api/index.md" },
]

[project.theme]
variant = "modern"
features = [
  "navigation.tabs",
  "navigation.top",
  "navigation.footer",
  "toc.follow",
  "content.action.edit",
  "content.action.view",
  "search.highlight",
]

[project.plugins.mkdocstrings.handlers.python]
paths = ["python"]
inventories = ["https://docs.python.org/3/objects.inv"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "numpy"
inherited_members = false
show_source = true
members_order = "alphabetical"
show_root_heading = true
show_root_full_path = false
